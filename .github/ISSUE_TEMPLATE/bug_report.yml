name: Bug Report
description: Something isn't working correctly
labels: [bug]
body:
  - type: input
    id: page
    attributes:
      label: Affected Page / Route
      placeholder: e.g. /automotive or /service-areas/tampa-fl
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: dropdown
    id: device
    attributes:
      label: Device
      options: [Desktop, Mobile, Tablet]
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: e.g. Chrome 122
