name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      placeholder: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Homepage
        - Automotive page
        - Residential page
        - Commercial page
        - Smart Solutions page
        - Service Areas
        - Contact / Forms
        - SEO
        - Performance
        - Design / UI
        - Chatbot
        - Other
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Additional context / mockups
